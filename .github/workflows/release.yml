name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-canary.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Determine build env
        id: env
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-canary."* ]]; then
            echo "BUILD_ENV=canary" >> "$GITHUB_OUTPUT"
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "BUILD_ENV=stable" >> "$GITHUB_OUTPUT"
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (${{ steps.env.outputs.BUILD_ENV }}) [${{ matrix.arch }}]
        run: bun run build:${{ steps.env.outputs.BUILD_ENV }}

      # Electrobun build outputs to artifacts/ directory
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Determine release type
        id: env
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-canary."* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.env.outputs.IS_PRERELEASE == 'true' }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
